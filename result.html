<!DOCTYPE html>
<html>
<head>
    <title>Prediction Result</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

<div class="container mt-5">

    <div class="card bg-secondary p-4 text-center">

        <h2>📈 Stock: {{ stock }}</h2>

        <h3 class="mt-3">
            Trend: 
            <span class="text-warning">{{ result }}</span>
        </h3>

        <h4>Predicted Price: ${{ price }}</h4>

        <img src="/{{ image }}" class="img-fluid mt-3" style="border-radius:10px;">

        <a href="/" class="btn btn-light mt-3">🔙 Back</a>

    </div>

</div>

</body>
</html>
