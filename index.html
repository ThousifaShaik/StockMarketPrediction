<!DOCTYPE html>
<html>
<head>
    <title>Stock Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

<div class="container mt-5">

    <div class="card bg-secondary text-white p-4">

        <h2 class="text-center">📊 Stock Market Predictor</h2>

        <form action="/predict" method="POST" class="mt-4">

            <label class="form-label">Select Stock</label>

            <select name="stock" class="form-select" required>
                <option value="AAPL">Apple</option>
                <option value="GOOGL">Google</option>
                <option value="TSLA">Tesla</option>
                <option value="MSFT">Microsoft</option>
            </select>

            <button type="submit" class="btn btn-warning mt-3 w-100">
                Predict 🚀
            </button>

        </form>

    </div>

</div>

</body>
</html>
