<!DOCTYPE html>
<html>
<head>
    <title>Prediction History</title>
    <style>
        body{
            font-family: Arial;
            background:#0f172a;
            color:white;
            padding:20px;
        }

        table{
            width:100%;
            border-collapse: collapse;
            margin-top:20px;
            background:#1e293b;
        }

        th, td{
            padding:12px;
            border:1px solid #334155;
            text-align:center;
        }

        th{
            background:#334155;
        }

        .up{ color:#22c55e; }
        .down{ color:#ef4444; }
    </style>
</head>

<body>

<h1>📊 Prediction History</h1>

<table>
    <tr>
        <th>Stock</th>
        <th>Company</th>
        <th>Current Price</th>
        <th>Predicted Price</th>
        <th>Recommendation</th>
        <th>Trend</th>
        <th>Time</th>
    </tr>

    {% for row in data %}
    <tr>
        <td>{{ row[0] }}</td>
        <td>{{ row[1] }}</td>
        <td>{{ row[2] }}</td>
        <td>{{ row[3] }}</td>
        <td>{{ row[4] }}</td>
        <td class="{% if 'UP' in row[5] %}up{% else %}down{% endif %}">
            {{ row[5] }}
        </td>
        <td>{{ row[6] }}</td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
